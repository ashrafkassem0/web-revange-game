<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الانتقام — خريطة الغابة</title>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="hud">
    <div class="hud-panel">
      <h1>🌲 خريطة الغابة</h1>
      <p>الحياة: <span id="hp-value">100/100</span></p>
      <p>السرعة: <span id="speed-value">1 م/ث</span></p>
      <p>المسافة: <span id="dist-value">0 كm</span></p>
      <p>الحركة: <span id="anim-value">idle</span></p>
    </div>
    <div class="hud-controls">
      <p>WASD / أسهم — تحريك | Shift — جري | Space — قفz</p>
      <button id="btn-menu" type="button">القائمة الرئيسية</button>
    </div>
  </div>

  <script src="/js/characters.js"></script>
  <script src="/js/character-rules.js"></script>
  <script src="/js/crafting.js"></script>
  <script src="/js/maps/forest-map.js"></script>
  <script src="/js/shared.js"></script>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
