<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المدينة — ريفنج</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/shared.css">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: radial-gradient(circle at 50% 0%, #354153 0%, #1a1d29 48%, #0d1018 100%);
        font-family: 'Cairo', sans-serif; overflow: hidden;
    }
    canvas { display: block; }

    #hud {
        position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
        min-width: min(460px, calc(100vw - 24px)); justify-content: space-between;
        background: linear-gradient(135deg, rgba(19,26,36,.94), rgba(39,46,53,.90));
        border: 1px solid rgba(255,208,96,.45); border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0,0,0,.34), inset 0 1px rgba(255,255,255,.08);
        padding: 8px 16px; color: #eee; font-size: .85rem; display: flex;
        align-items: center; gap: 16px; z-index: 20; backdrop-filter: blur(8px);
    }
    .city-title { color:#ffd060; font-weight:900; letter-spacing:.3px; }
    .hero-attributes { display:flex; align-items:center; gap:10px; color:#dce6f2; font-size:.76rem; }
    .hero-attributes strong { color:#ffe49a; }
    .bar-wrap { display: flex; align-items: center; gap: 6px; }
    .bar-bg { width: 100px; height: 9px; background: #111820; border:1px solid rgba(255,255,255,.12); border-radius: 5px; overflow: hidden; }
    #hpBar  { height: 100%; background: linear-gradient(90deg,#e74c3c,#c0392b); border-radius: 5px; width: 100%; transition: width 0.2s; }

    #invPanel {
        position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
        max-width: calc(100vw - 24px); overflow-x: auto;
        background: linear-gradient(135deg, rgba(15,21,30,.94), rgba(32,37,42,.90));
        border: 1px solid rgba(255,255,255,.18); border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,.35); padding: 8px 16px; display: flex; gap: 14px; align-items: center; z-index: 20;
        color: #ddd; font-size: 0.8rem; backdrop-filter: blur(8px);
    }
    .inv-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .inv-icon { font-size: 1.1rem; }
    .inv-count { font-size: 0.72rem; color: #aaa; }

    #modal {
        display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
        z-index: 50; align-items: center; justify-content: center;
    }
    #modal.open { display: flex; }
    #modalBox {
        background: linear-gradient(145deg,#18241d 0%,#252a25 58%,#171b1e 100%);
        border: 1px solid #c9a751; outline: 1px solid rgba(255,255,255,.08); border-radius: 16px;
        box-shadow: 0 22px 65px rgba(0,0,0,.62), inset 0 1px rgba(255,255,255,.07);
        padding: 28px 32px; min-width: 340px; max-width: 510px;
        max-height: 80vh; overflow-y: auto; color: #e8e0c0; position: relative;
    }
    #modalTitle { font-size: 1.3rem; font-weight: 900; margin-bottom: 16px; color: #ffd060; }
    #modalBody { font-size: 0.9rem; line-height: 1.7; }
    .trade-row {
        display: flex; align-items: center; justify-content: space-between;
        background: linear-gradient(90deg, rgba(255,255,255,.075), rgba(255,255,255,.025));
        border: 1px solid rgba(255,255,255,.08); border-radius: 9px;
        padding: 9px 12px; margin-bottom: 8px; gap: 10px;
    }
    .trade-btn {
        background: linear-gradient(135deg,#789d30,#3f681d); color: #fff0b2;
        border: 1px solid rgba(255,226,136,.35); border-radius: 8px; padding: 6px 14px;
        box-shadow: inset 0 1px rgba(255,255,255,.16), 0 2px 5px rgba(0,0,0,.22);
        font-family: 'Cairo',sans-serif; font-size: 0.82rem; cursor: pointer;
        transition: transform 0.1s, filter 0.1s;
    }
    .trade-btn:hover { filter: brightness(1.2); transform: scale(1.04); }
    .trade-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .close-btn {
        position: absolute; top: 12px; left: 14px;
        background: none; border: none; color: #aaa;
        font-size: 1.4rem; cursor: pointer; line-height: 1;
    }
    .close-btn:hover { color: #fff; }
    .shop-section { color:#d9c17a; font-size:.78rem; letter-spacing:.2px; margin:14px 0 8px; }
    .shop-balance { margin-bottom:12px; color:#f7dc88; background:rgba(255,208,96,.08); border:1px solid rgba(255,208,96,.16); border-radius:8px; padding:7px 10px; }
    #cityMinimap {
        position:fixed; top:78px; right:14px; z-index:21; width:154px; height:126px;
        background:rgba(12,18,23,.9); border:1px solid rgba(255,208,96,.55); border-radius:10px;
        box-shadow:0 8px 22px rgba(0,0,0,.38); padding:5px;
    }
    #cityMinimap::before { content:'خريطة المدينة'; position:absolute; top:5px; right:9px; color:#ffe49a; font:700 10px Cairo,sans-serif; text-shadow:0 1px #000; }
    #cityMapCanvas { width:142px; height:108px; margin-top:10px; border-radius:5px; display:block; }
    /* Forest-style city HUD: materials and hero state left, tools/map/missions right. */
    #hud { position:fixed; inset:0; transform:none; min-width:0; width:auto; padding:12px 14px; background:none; border:0; box-shadow:none; backdrop-filter:none; pointer-events:none; display:flex; justify-content:space-between; align-items:flex-start; direction:ltr; }
    #cityHudLeft, #cityHudCenter, #cityHudRight { direction:rtl; pointer-events:none; }
    #cityHudLeft { display:flex; flex-direction:column; gap:8px; align-items:flex-start; }
    #cityHudCenter { flex:1; text-align:center; padding-top:4px; }
    #cityHudRight { display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
    .city-hud-panel { background:rgba(10,15,22,.82); border:1px solid rgba(255,255,255,.12); border-radius:11px; box-shadow:0 7px 20px rgba(0,0,0,.32); backdrop-filter:blur(7px); }
    #invPanel { position:static; transform:none; max-width:430px; overflow-x:auto; border-radius:11px; padding:7px 10px; box-shadow:none; }
    #cityStatus { padding:9px 12px; color:#e8e0c0; min-width:245px; }
    #cityStatus .stat-line { display:flex; align-items:center; gap:7px; font-size:.72rem; }
    #cityStatus .bar-bg { width:128px; }
    #cityStatus .city-stat-numbers { display:flex; gap:12px; margin-top:7px; padding-top:6px; border-top:1px solid rgba(255,208,96,.16); font-size:.72rem; color:#d8dde5; }
    #cityStatus strong { color:#ffe49a; }
    #cityHudTitle { color:#ffe49a; font-size:1rem; font-weight:900; text-shadow:0 2px 7px #000; }
    #cityHudTop { display:flex; align-items:flex-start; gap:8px; direction:ltr; }
    #cityMinimap { position:relative; top:auto; right:auto; width:154px; height:126px; }
    #cityHudTools { display:flex; flex-direction:column; gap:6px; pointer-events:auto; position:relative; }
    .city-tool { background:rgba(13,20,28,.9); border:1px solid rgba(255,208,96,.38); border-radius:8px; color:#ffe49a; padding:7px 9px; font:700 .7rem Cairo,sans-serif; cursor:pointer; white-space:nowrap; }
    .city-tool:hover { filter:brightness(1.2); }
    #cityMissionPanel { width:154px; padding:8px 10px; }
    #cityMissionPanel h3 { margin:0 0 5px; color:#ffd060; font-size:.75rem; border-bottom:1px solid rgba(255,208,96,.2); padding-bottom:4px; }
    #cityMissionText { color:#d7d7cf; font-size:.65rem; line-height:1.55; }
    #cityAudioPanel { display:none; position:absolute; top:0; right:100%; width:184px; padding:10px; z-index:70; direction:rtl; }
    #cityAudioPanel.open { display:block; }
    #cityAudioPanel h3 { color:#ffd060; font-size:.8rem; margin:0 0 7px; }
    .audio-row { display:flex; align-items:center; gap:7px; margin:6px 0; font-size:.65rem; color:#ddd; }
    .audio-row input[type=range] { width:92px; }
    @media (max-width: 600px) {
        #hud { min-width:0; width:calc(100vw - 20px); padding:7px 12px; }
        #invPanel { gap:10px; padding:7px 11px; }
        #modalBox { min-width:0; width:calc(100vw - 24px); padding:24px 18px; }
        #hint { max-width:calc(100vw - 24px); white-space:normal; text-align:center; }
        #cityMinimap { right:4px; }
        #cityHudCenter { display:none; }
        #cityMissionPanel { display:none; }
        #cityHudRight { transform:scale(.86); transform-origin:top right; }
    }

    #questHint {
        position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.8); border: 1px solid #5a5a3a; border-radius: 10px;
        padding: 6px 18px; color: #ffd060; font-size: 0.78rem; z-index: 19;
        display: none; pointer-events: none; white-space: nowrap; bottom: 95px;
    }
    #hint {
        position: fixed; bottom: 58px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.7); color: #aaa; font-size: 0.75rem;
        padding: 5px 14px; border-radius: 10px; white-space: nowrap; z-index: 20;
    }
    #notify {
        position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.8); color: #ffd060; font-size: 0.9rem;
        padding: 7px 20px; border-radius: 20px; z-index: 60;
        display: none; pointer-events: none;
    }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="hud">
    <div id="cityHudLeft">
        <div id="invPanel" class="city-hud-panel">
            <div class="inv-item" style="border-left:1px solid #555;padding-left:0;padding-right:12px"><span class="inv-icon">🪙</span><span class="inv-count" id="inv-coins" style="color:#ffd060">0</span></div>
            <div class="inv-item"><span class="inv-icon">🪵</span><span class="inv-count" id="inv-stick">0</span></div>
            <div class="inv-item"><span class="inv-icon">🪨</span><span class="inv-count" id="inv-stone">0</span></div>
            <div class="inv-item"><span class="inv-icon">🥩</span><span class="inv-count" id="inv-meat">0</span></div>
            <div class="inv-item"><span class="inv-icon">🧥</span><span class="inv-count" id="inv-leather">0</span></div>
            <div class="inv-item"><span class="inv-icon">🌿</span><span class="inv-count" id="inv-herb">0</span></div>
            <div class="inv-item"><span class="inv-icon">🍯</span><span class="inv-count" id="inv-honey">0</span></div>
            <div class="inv-item"><span class="inv-icon">🐟</span><span class="inv-count" id="inv-fish">0</span></div>
            <div class="inv-item"><span class="inv-icon">🏹</span><span class="inv-count" id="inv-arrows">0</span></div>
            <div class="inv-item"><span class="inv-icon">🦷</span><span class="inv-count" id="inv-teeth">0</span></div>
            <div class="inv-item"><span class="inv-icon">🦴</span><span class="inv-count" id="inv-horn">0</span></div>
        </div>
        <div id="cityStatus" class="city-hud-panel">
            <div class="stat-line">❤️ <div class="bar-bg"><div id="hpBar"></div></div><span id="hpVal">100/100</span></div>
            <div class="city-stat-numbers"><span>⚔️ هجوم <strong id="atkVal">25</strong></span><span>🛡️ دفاع <strong id="defVal">5</strong></span><span>⭐ مستوى <strong id="levelVal">1</strong></span></div>
        </div>
    </div>
    <div id="cityHudCenter"><div id="cityHudTitle">🏙️ مدينة ريفنج</div></div>
    <div id="cityHudRight">
        <div id="cityHudTop">
            <div id="cityHudTools">
                <button class="city-tool" type="button" onclick="manualSaveCity()">💾 حفظ</button>
                <button class="city-tool" type="button" onclick="toggleCityAudio()">🔊 الصوت</button>
                <div id="cityAudioPanel" class="city-hud-panel">
                    <h3>إعدادات الصوت</h3>
                    <div class="audio-row"><label>الرئيسي</label><input type="range" min="0" max="100" value="100" oninput="setCityVolume('master',this.value)"></div>
                    <div class="audio-row"><label>المؤثرات</label><input type="range" min="0" max="100" value="100" oninput="setCityVolume('sfx',this.value)"></div>
                    <div class="audio-row"><label>الأجواء</label><input type="range" min="0" max="100" value="100" oninput="setCityVolume('ambient',this.value)"></div>
                </div>
            </div>
            <div id="cityMinimap"><canvas id="cityMapCanvas" width="142" height="108"></canvas></div>
        </div>
        <div id="cityMissionPanel" class="city-hud-panel"><h3>📜 مهامي</h3><div id="cityMissionText">جاري تحميل المهمة…</div></div>
    </div>
</div>

<div id="questHint"></div>

<div id="hint">WASD / ↑↓←→ للحركة &nbsp;|&nbsp; E للتفاعل &nbsp;|&nbsp; بوابة الشمال ← الغابة &nbsp;|&nbsp; بوابة الجنوب ← الغابة (مقفلة)</div>
<div id="notify"></div>

<div id="modal">
    <div id="modalBox">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <div id="modalTitle"></div>
        <div id="modalBody"></div>
    </div>
</div>

<div class="fade-overlay"></div>

<script src="../js/shared.js"></script>
<script src="../js/sounds.js"></script>
<script>
// ─────────────── CONFIG ───────────────
const CFG = {
    TILE: 48,
    COLS: 22,
    ROWS: 18,
    SPEED: 2.8,
};
const W = CFG.COLS * CFG.TILE;  // 1056
const H = CFG.ROWS * CFG.TILE;  // 864

// Tile types
const T = { STONE: 0, ROAD: 1, BUILDING: 2, GRASS: 3, WATER: 4, SAND: 5 };

// City map (22 cols × 18 rows)
// B=building, S=stone, R=road, G=grass, W=water, D=sand/dirt
// Districts: NORTH commerce (rows 2-4), CENTRAL plaza (rows 8-10), SOUTH (rows 14-15)
const MAP_STR = [
    'BBBBBBBBBBBBBBBBBBBBBB',
    'BSSSSSSSSSSSSSSSSSSSBB',
    'BSBBBSBBBSBBBSBBBSBBB',
    'BSBBBSBBBSBBBSBBBSBBB',
    'BSBBBSBBBSBBBSBBBSBBB',
    'BSSSSSRRRRRRRRRSSSSSBB',
    'BSGGGGSRGGGGGGRSGGGBB',
    'BSGGGGSRGGGGGGRSGGGBB',
    'BSRRSSSSSSWWSSSSSSRRSB',
    'BSRRSSSSSSSSSSSSSSRRSB',
    'BSRRSSSSSSSSSSSSSSRRSB',
    'BSRRRRRRSSSSSSRRRRRRSB',
    'BSSSSSSSRGGGGGRSSSSSSB',
    'BSRRRRRRRGGGGGRRRRRRSB',
    'BSBBBSBBSSSSSSBBBSBBB',
    'BSBBBSBBSSSSSSBBBSBBB',
    'BSSSSSSSDDDDDDDSSSSSSB',
    'BBBBBBBDDDDDDDDBBBBBBB',
].map(row => [...row].map(c => ({'B':T.BUILDING,'S':T.STONE,'R':T.ROAD,'G':T.GRASS,'W':T.WATER,'D':T.SAND}[c]??T.STONE)));

function getTile(c, r) {
    if (c < 0 || c >= CFG.COLS || r < 0 || r >= CFG.ROWS) return T.BUILDING;
    return MAP_STR[r][c];
}
function isBlocked(wx, wy) {
    return getTile(Math.floor(wx / CFG.TILE), Math.floor(wy / CFG.TILE)) === T.BUILDING;
}

const FOREST_PORTAL = { x: W / 2, y: CFG.TILE * 1.5, radius: 52 };
const SOUTH_GATE = { x: W / 2, y: H - CFG.TILE * 1.5, radius: 52 };

// ─────────────── STATE ───────────────
const inv = GameState.getInventory();
const stats = GameState.getHeroStats();
const fromForest = GameState.load('fromCity') === false;
if (fromForest) GameState.save('fromCity', null);
const player = {
    x: fromForest ? FOREST_PORTAL.x : W / 2,
    y: fromForest ? FOREST_PORTAL.y + 64 : H - CFG.TILE * 2.5,
    hp: Math.min(stats.hp || 100, stats.maxHp || 100),
    maxHp: stats.maxHp || 100,
    attack: (stats.attack || 25) + (stats.absorbedAttack || 0),
    defense: (stats.defense || 5) + (stats.absorbedDefense || 0),
    level: stats.level || 1,
    inventory: (typeof GameState.normalizeInventory === 'function')
        ? GameState.normalizeInventory(inv)
        : Object.assign({
            stick:0, stone:0, meat:0, horn:0, teeth:0, leather:0, fish:0, arrows:15,
            rawMeat:0, cookedMeat:0, rawFish:0, cookedFish:0,
            beastHide:0, nightCrystal:0, venomSac:0, shadowEssence:0,
            herb:0, honey:0, herbSalve:0, revitalTonic:0, coins:0
        }, inv),
    walkTimer: 0, isMoving: false, facing: 'down',
};

function foodCount(kind) {
    if (typeof GameState !== 'undefined' && GameState.countFood) {
        return GameState.countFood(player.inventory, kind);
    }
    if (kind === 'fish') {
        return (player.inventory.fish || 0) + (player.inventory.rawFish || 0) + (player.inventory.cookedFish || 0);
    }
    return (player.inventory.meat || 0) + (player.inventory.rawMeat || 0) + (player.inventory.cookedMeat || 0);
}

function persistCityInventory() {
    GameState.save('inventory', player.inventory);
    const st = GameState.getHeroStats();
    st.hp = player.hp;
    st.maxHp = player.maxHp;
    GameState.save('heroStats', st);
}

// ─────────────── NPCs ───────────────
const NPCS = [
    {
        id: 'merchant',
        x: CFG.TILE * 11.5, y: CFG.TILE * 5.5,
        emoji: '🧑‍💼', label: 'التاجر',
        color: '#8060a0',
        greetFirst: 'أهلاً أيها المسافر… لدي سهام مقابل مواردك.',
        greetReturn: 'عدت؟ حسناً، لنرَ ما لديك.',
        onInteract() { openNpcIntro(this, openMerchant); }
    },
    {
        id: 'healer',
        x: CFG.TILE * 7, y: CFG.TILE * 5.5,
        emoji: '🧑‍⚕️', label: 'المعالج',
        color: '#2080a0',
        greetFirst: 'الجروح كثيرة في هذه البلاد… هل تحتاج علاجاً؟',
        greetReturn: 'الصحة أولاً. ماذا تحتاج؟',
        onInteract() { openNpcIntro(this, openHealer); }
    },
    {
        id: 'blacksmith',
        x: CFG.TILE * 3, y: CFG.TILE * 5.5,
        emoji: '⚒️', label: 'الحداد',
        color: '#a06020',
        greetFirst: 'أرى معداتك… أصنع في الغابة، وأراجع هنا.',
        greetReturn: 'أظهر لي ما صنعت.',
        onInteract() { openNpcIntro(this, openBlacksmith); }
    },
];

// ─────────────── NPC DIALOGUE ───────────────
function getCityMapState() {
    const st = GameState.getMapState('city');
    return st || { completedQuests: [], spokenToNpcs: [], boughtItems: [] };
}

function persistCityMapState(st) {
    GameState.setMapState('city', st || getCityMapState());
}

function markSpoken(npcId) {
    const st = getCityMapState();
    if (!Array.isArray(st.spokenToNpcs)) st.spokenToNpcs = [];
    if (!st.spokenToNpcs.includes(npcId)) {
        st.spokenToNpcs.push(npcId);
        persistCityMapState(st);
    }
}

function isSpoken(npcId) {
    const st = getCityMapState();
    return Array.isArray(st.spokenToNpcs) && st.spokenToNpcs.includes(npcId);
}

function openNpcIntro(npc, thenOpenService) {
    const first = !isSpoken(npc.id);
    const text = first ? npc.greetFirst : npc.greetReturn;
    const extraButtons = first
        ? `<button class="trade-btn" onclick="(function(){ markSpoken('${npc.id}'); ${thenOpenService.name}(); })();" style="margin-top:10px">متابعة</button>`
        : `<button class="trade-btn" onclick="${thenOpenService.name}();" style="margin-top:10px">فتح الخدمة</button>`;

    let loreBtn = '';
    if (npc.id === 'blacksmith') {
        loreBtn = `<button class="trade-btn" onclick="openSouthLore()" style="margin-top:10px;margin-right:8px">🗺️ عن البوابة الجنوبية</button>`;
    }

    openModal(`${npc.emoji} ${npc.label}`, `
        <p style="margin-bottom:14px;color:#ccc;line-height:1.8">${text}</p>
        <div style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap">
            ${extraButtons}
            ${loreBtn}
        </div>
    `);
}

function openSouthLore() {
    openModal('🗺️ البوابة الجنوبية', `
        <p style="margin-bottom:14px;color:#ccc;line-height:1.8">
            البوابة الجنوبية تؤدي إلى غابة كثيفة جنوب المدينة… طريق وعِر لكنه مليء بالموارد.
            يقول الحراس إن البوابة مغلقة بإحكام، ولا تفتح إلا لمن أثبت جدارته.
        </p>
        <div style="display:flex;justify-content:center">
            <button class="trade-btn" onclick="openBlacksmith()">🔙 العودة</button>
        </div>
    `);
}

// Expose dialogue helpers for modal onclick handlers
window.markSpoken = markSpoken;
window.openSouthLore = openSouthLore;

// ─────────────── TRADE TRACKING ───────────────
function recordBought(itemId) {
    const st = getCityMapState();
    if (!Array.isArray(st.boughtItems)) st.boughtItems = [];
    st.boughtItems.push({ id: itemId, at: Date.now() });
    persistCityMapState(st);
}
window.recordBought = recordBought;

function persistHp() {
    const st = GameState.getHeroStats();
    st.hp = player.hp;
    st.maxHp = player.maxHp;
    GameState.save('heroStats', st);
}

// ─────────────── QUESTS ───────────────
function isQuestDone(id) {
    const st = getCityMapState();
    return Array.isArray(st.completedQuests) && st.completedQuests.includes(id);
}

function completeQuest(id, rewardFn) {
    const st = getCityMapState();
    if (!Array.isArray(st.completedQuests)) st.completedQuests = [];
    if (!st.completedQuests.includes(id)) st.completedQuests.push(id);
    if (typeof rewardFn === 'function') rewardFn();
    persistCityMapState(st);
    notify(`✔️ اكتملت: ${id}`, '#6ddc6d', 3500);
}
window.completeQuest = completeQuest;

function isSouthGateUnlocked() {

function resize() {

// ─────────────── PRE-RENDER TERRAIN ───────────────
let terrainCanvas = null;

function th(c, r, s) { return Math.abs(Math.sin(c*127.1*(s||1) + r*311.7)) % 1; }
function rh(a, b)    { return Math.abs(Math.sin(a*127.1 + b*311.7 + a*b*0.0013)) % 1; }

function loadTerrainTextures(onReady) {
    const names = ['grass', 'water', 'sand'];
    const tex = {};
    let pending = names.length;
    names.forEach(name => {
        const img = new Image();
        img.onload  = () => { tex[name] = img; if (--pending === 0) onReady(tex); };
        img.onerror = () => {                   if (--pending === 0) onReady(tex); };
        img.src = '../textures/' + name + '.png';
    });
}

function prerenderTerrain(textures) {
    terrainCanvas = document.createElement('canvas');
    terrainCanvas.width  = W;
    terrainCanvas.height = H;
    const tc = terrainCanvas.getContext('2d');
    const ts = CFG.TILE;

    // Helper: stochastic bombing for one terrain type
    function bombTexture(tileId, img, tint) {
        if (!img || !img.complete || img.naturalWidth === 0) return;
        const iW = img.naturalWidth, iH = img.naturalHeight;
        const sampleSize = Math.min(180, Math.min(iW, iH) * 0.58);
        const patchR = Math.min(120, sampleSize * 0.7 + 18);
        const step   = Math.round(patchR * 1.12);

        tc.save();
        tc.beginPath();
        for (let r = 0; r < CFG.ROWS; r++) {
            for (let c = 0; c < CFG.COLS; c++) {
                if (getTile(c, r) === tileId) tc.rect(c*ts-1, r*ts-1, ts+2, ts+2);
            }
        }
        tc.clip();

        let gi = 0;
        const pad = patchR + step;
        for (let gy = -pad; gy < H + pad; gy += step) {
            for (let gx = -pad; gx < W + pad; gx += step) {
                const h0=rh(gi,tileId*17+1), h1=rh(gi,tileId*17+2), h2=rh(gi,tileId*17+3);
                const h3=rh(gi,tileId*17+4), h4=rh(gi,tileId*17+5), h5=rh(gi,tileId*17+6);
                gi++;
                const wx = gx + h0*step, wy = gy + h1*step;
                const srcX = h2 * Math.max(1, iW - sampleSize);
                const srcY = h3 * Math.max(1, iH - sampleSize);
                const sw = Math.min(sampleSize, iW - srcX);
                const sh = Math.min(sampleSize, iH - srcY);
                const pr = patchR * (0.82 + h5*0.36);
                tc.save();
                tc.translate(wx, wy); tc.rotate(h4 * Math.PI * 2);
                tc.beginPath(); tc.arc(0, 0, pr, 0, Math.PI * 2); tc.clip();
                tc.globalAlpha = 0.72 + h5 * 0.24;
                tc.drawImage(img, srcX, srcY, sw, sh, -pr, -pr, pr*2, pr*2);
                tc.restore();
            }
        }
        if (tint) { tc.fillStyle = tint; tc.fillRect(0, 0, W, H); }
        tc.restore();
    }

    // PASS 1: procedural base for all tiles
    for (let r = 0; r < CFG.ROWS; r++) {
        for (let c = 0; c < CFG.COLS; c++) {
            const t = getTile(c, r);
            const tx = c * ts, ty = r * ts;
            const s1 = th(c,r,1), s2 = th(c,r,2), s3 = th(c,r,3);

            if (t === T.BUILDING) {
                const gv = 55 + Math.floor(s1 * 15);
                tc.fillStyle = `rgb(${gv},${gv-4},${gv-8})`;
                tc.fillRect(tx, ty, ts+1, ts+1);
                tc.strokeStyle = `rgba(30,28,24,0.45)`; tc.lineWidth = 1;
                const bh = ts / 3;
                for (let i = 0; i < 3; i++) {
                    tc.beginPath(); tc.moveTo(tx, ty+i*bh); tc.lineTo(tx+ts, ty+i*bh); tc.stroke();
                    const off = (i%2===0) ? ts/2 : 0;
                    tc.beginPath(); tc.moveTo(tx+off, ty+i*bh); tc.lineTo(tx+off, ty+(i+1)*bh); tc.stroke();
                }
            } else if (t === T.STONE) {
                tc.fillStyle = `rgb(${140+Math.floor(s1*12)},${138+Math.floor(s2*10)},${128+Math.floor(s3*10)})`;
                tc.fillRect(tx, ty, ts+1, ts+1);
                tc.strokeStyle = 'rgba(100,95,85,0.35)'; tc.lineWidth = 1;
                tc.strokeRect(tx+0.5, ty+0.5, ts-1, ts-1);
            } else if (t === T.ROAD) {
                tc.fillStyle = `rgb(${100+Math.floor(s1*10)},${95+Math.floor(s2*8)},${80+Math.floor(s3*8)})`;
                tc.fillRect(tx, ty, ts+1, ts+1);
                tc.strokeStyle = 'rgba(60,55,45,0.4)'; tc.lineWidth = 0.8;
                tc.strokeRect(tx+2, ty+2, ts/2-2, ts-4);
                tc.strokeRect(tx+ts/2, ty+2, ts/2-2, ts-4);
            } else if (t === T.GRASS) {
                tc.fillStyle = '#3a8228';
                tc.fillRect(tx, ty, ts+1, ts+1);
            } else if (t === T.WATER) {
                tc.fillStyle = '#0e5ab5';
                tc.fillRect(tx, ty, ts+1, ts+1);
            } else if (t === T.SAND) {
                tc.fillStyle = '#c4a03a';
                tc.fillRect(tx, ty, ts+1, ts+1);
            }
        }
    }

    // PASS 2: stochastic texture bombing for natural terrain types
    const tex = textures || {};
    bombTexture(T.GRASS, tex.grass, null);
    bombTexture(T.WATER, tex.water, 'rgba(0,15,50,0.18)');
    bombTexture(T.SAND,  tex.sand,  null);

    // PASS 3: sparse detail accents on top of photo textures
    for (let r = 0; r < CFG.ROWS; r++) {
        for (let c = 0; c < CFG.COLS; c++) {
            const t = getTile(c, r);
            if (t !== T.GRASS) continue;
            const tx = c*ts, ty = r*ts;
            const s1 = th(c,r,1), s2 = th(c,r,2), s3 = th(c,r,3);
            if (s1 > 0.88) {
                tc.fillStyle = s2 > 0.5 ? 'rgba(255,230,50,0.70)' : 'rgba(255,120,160,0.62)';
                tc.beginPath(); tc.arc(tx+s2*ts, ty+s3*ts, 1.4, 0, Math.PI*2); tc.fill();
            }
        }
    }
}

    if (kind === 'ambient' && SFX.setAmbientVolume) SFX.setAmbientVolume(amount);

function notify(msg, color = '#ffd060', duration = 2200) {
    const el = document.getElementById('notify');
    el.textContent = msg;
    el.style.color = color;
    el.style.display = 'block';
    clearTimeout(el._t);

}

function updateHUD() {
    document.getElementById('hpBar').style.width = (player.hp / player.maxHp * 100) + '%';
    document.getElementById('hpVal').textContent = `${Math.ceil(player.hp)}/${player.maxHp}`;
    const atkEl = document.getElementById('atkVal');
    const defEl = document.getElementById('defVal');
    const levelEl = document.getElementById('levelVal');
    if (atkEl) atkEl.textContent = Math.floor(player.attack || 0);
    if (defEl) defEl.textContent = Math.floor(player.defense || 0);
    if (levelEl) levelEl.textContent = player.level || 1;
    const inv = player.inventory;
    document.getElementById('inv-coins').textContent = inv.coins || 0;
    document.getElementById('inv-stick').textContent = inv.stick || 0;
    document.getElementById('inv-stone').textContent = inv.stone || 0;
    document.getElementById('inv-meat').textContent = foodCount('meat');
    document.getElementById('inv-horn').textContent = inv.horn || 0;
    document.getElementById('inv-teeth').textContent = inv.teeth || 0;
    document.getElementById('inv-leather').textContent = inv.leather || 0;
    const herbEl = document.getElementById('inv-herb');
    if (herbEl) herbEl.textContent = inv.herb || 0;
    const honeyEl = document.getElementById('inv-honey');
    if (honeyEl) honeyEl.textContent = inv.honey || 0;
    document.getElementById('inv-fish').textContent = foodCount('fish');
    document.getElementById('inv-arrows').textContent = inv.arrows || 0;

}

function refreshCityQuestHint() {
    const el = document.getElementById('questHint');
    const missionEl = document.getElementById('cityMissionText');
    if (el) el.style.display = 'none';
    const setMission = text => { if (missionEl) missionEl.textContent = text; };
    if (isQuestDone('quest_valley_path')) {
        if (GameState.load('completedCity', false)) {
            setMission('✔️ اكتملت مهام المدينة. يمكنك متابعة رحلتك.');
        } else {
            setMission('🔓 البوابة الجنوبية مفتوحة — اذهب إلى الغابة الجنوبية.');
        }
        return;
    }
    if (isQuestDone('quest_traveler_supplies')) {
        setMission('📋 طريق الوادي: سلّم للحداد جلد وحشي واحداً و3 أسنان.');
        return;
    }
    const st = getCityMapState();
    const barters = Array.isArray(st.boughtItems) ? st.boughtItems.length : 0;
    setMission(`📋 ذخيرة المسافر: مقايضات ${barters}/2 أو اجمع 20 سهماً.`);
}

// ─────────────── INTERACTION ───────────────
function handleInteract() {
    if (document.getElementById('modal').classList.contains('open')) return;
    const now = Date.now();
    if (now < portalCooldownUntil) return;
    // Forest portal — always open (hub rule)
    if (isNearPortal(FOREST_PORTAL)) {
        portalCooldownUntil = now + 1000;
        openModal('🌲 العودة للغابة', `
            <p style="margin-bottom:14px;color:#ccc;line-height:1.8">العودة إلى الغابة؟ الغابة تربط كل المناطق.</p>
            <div style="display:flex;justify-content:center;gap:8px">
                <button class="trade-btn" onclick="closeModal(); saveAndExit();">نعم</button>
                <button class="trade-btn" onclick="closeModal();">لا</button>
            </div>
        `);
        return;
    }
    // South gate
    if (isNearPortal(SOUTH_GATE)) {
        portalCooldownUntil = now + 1000;
        if (!isSouthGateUnlocked()) {
            notify('🚧 البوابة الجنوبية مغلقة — أكمل مهام المدينة أولاً', '#e74c3c');
        } else {
            openModal('🚪 البوابة الجنوبية', `
                <p style="margin-bottom:14px;color:#ccc;line-height:1.8">البوابة مفتوحة. هل أنت مستعد للذهاب إلى الغابة الجنوبية؟</p>
                <div style="display:flex;justify-content:center;gap:8px">
                    <button class="trade-btn" onclick="closeModal(); saveAndGoSouthForest();">🗡️ اذهب إلى الغابة</button>
                    <button class="trade-btn" onclick="closeModal()">إلغاء</button>
                </div>
            `);
        }
        return;
    }
    // NPC
    const npc = NPCS.find(n => Math.hypot(player.x - n.x, player.y - n.y) < 55);
    if (npc) npc.onInteract();
}

    document.getElementById('modalBody').innerHTML = bodyHtml;
    document.getElementById('modal').classList.add('open');

}

function tradeRow(label, cost, costIcon, give, giveIcon, action) {

function coinBuyRow(label, give, giveIcon, coinAmt, action, enabled = true) {

        <span>🪙 ${coinAmt} ← ${giveIcon} +${give} ${label}</span>
        <button class="trade-btn" onclick='${action}' ${enabled ? '' : 'disabled'}>شراء</button>

function checkTravelerQuest() {
    if (isQuestDone('quest_traveler_supplies')) {
        notify('✔️ أنجزت ذخيرة المسافر من قبل', '#6ddc6d');
        openMerchant();
        return;
    }
    const barters = getCityMapState().boughtItems?.length || 0;
    const arrows = player.inventory.arrows || 0;
    if (barters >= 2 || arrows >= 20) {
        completeQuest('quest_traveler_supplies', () => {
            player.inventory.arrows = (player.inventory.arrows || 0) + 10;
            persistCityInventory();
        });
        notify('✔️ اكتملت: ذخيرة المسافر +10 🏹', '#6ddc6d');
        if (typeof SFX !== 'undefined' && SFX.cityChime) SFX.cityChime();
        updateHUD();
        openMerchant();
    } else {
        const needBarters = Math.max(0, 2 - barters);
        const needArrows = Math.max(0, 20 - arrows);
        notify(`❌ تحتاج ${needBarters} مقايضات إضافية أو ${needArrows} 🏹 سهماً`, '#e74c3c');
    }
}
window.checkTravelerQuest = checkTravelerQuest;

function checkValleyQuest() {
    if (isQuestDone('quest_valley_path')) {
        notify('✔️ أنجزت طريق الوادي من قبل — البوابة مفتوحة', '#6ddc6d');
        openBlacksmith();
        return;
    }
    const hide = player.inventory.beastHide || 0;
    const teeth = player.inventory.teeth || 0;
    if (hide < 1) { notify('❌ تحتاج 🐺 جلد وحشي 1 على الأقل', '#e74c3c'); return; }
    if (teeth < 3) { notify('❌ تحتاج 🦷 أسنان 3 على الأقل', '#e74c3c'); return; }
    player.inventory.beastHide -= 1;
    player.inventory.teeth -= 3;
    completeQuest('quest_valley_path', () => {
        persistCityInventory();
        if (typeof GameState.save === 'function') GameState.save('completedCity', true);
        notify('🗺️ البوابة الجنوبية فُتحت! يمكنك الذهاب إلى الغابة الجنوبية', '#ffd060', 4000);
    });
    if (typeof SFX !== 'undefined' && SFX.cityChime) SFX.cityChime();
    persistCityInventory();
    updateHUD();
    openBlacksmith();
}
window.checkValleyQuest = checkValleyQuest;

function craftItem(emoji, name, id) {
    const crafted = GameState.getCraftedItems();
    const has = crafted[id];
    return `<div class="trade-row" style="opacity:${has?1:0.5}">
        <span>${emoji} ${name}</span>
        <span style="color:${has?'#6ddc6d':'#888'}">${has?'✔ مصنوع':'✘ لم يُصنع'}</span>
    </div>`;
}

// Trade logic
window.trade = function(fromItem, fromAmt, toItem, toAmt) {
    if ((player.inventory[fromItem] || 0) < fromAmt) {
        notify(`❌ لا يكفي ${fromItem}`, '#e74c3c'); return;
    }
    player.inventory[fromItem] -= fromAmt;
    player.inventory[toItem] = (player.inventory[toItem] || 0) + toAmt;
    recordBought(toItem);
    notify(`✅ حصلت على ${toAmt} 🏹`, '#6ddc6d');
    persistCityInventory();
    updateHUD();
    openMerchant(); // refresh
};

/** Trade food using cooked/raw/legacy totals (same keys as forest). */
window.tradeFood = function(kind, fromAmt, toItem, toAmt) {
    if (foodCount(kind) < fromAmt) {
        notify(kind === 'fish' ? '❌ تحتاج سمكاً أكثر' : '❌ تحتاج لحماً أكثر', '#e74c3c');
        return;
    }
    if (typeof GameState !== 'undefined' && GameState.takeFood) {
        GameState.takeFood(player.inventory, kind, fromAmt);
    } else {
        player.inventory[kind] = (player.inventory[kind] || 0) - fromAmt;
    }
    player.inventory[toItem] = (player.inventory[toItem] || 0) + toAmt;
    recordBought(toItem);
    notify(`✅ حصلت على ${toAmt} 🏹`, '#6ddc6d');
    persistCityInventory();
    updateHUD();
    openMerchant();
};

window.sellForCoins = function(item, qty, coinAmt, refreshShop = 'openMerchant') {
    const inv = player.inventory;
    if ((inv[item] || 0) < qty) {
        notify(`❌ ليس لديك ما يكفي من ${itemName(item)}`, '#e74c3c');
        return;
    }
    inv[item] = (inv[item] || 0) - qty;
    inv.coins = (inv.coins || 0) + coinAmt;
    persistCityInventory();
    updateHUD();
    (refreshShop === 'openBlacksmith' ? openBlacksmith : openMerchant)();
    notify(`💰 ربحت ${coinAmt} دينار`, '#ffd060');
};

window.buyWithCoins = function(item, qty, coinAmt, refreshShop = 'openMerchant') {
    const inv = player.inventory;
    if ((inv.coins || 0) < coinAmt) {
        notify(`❌ تحتاج ${coinAmt} دينار`, '#e74c3c');
        return;
    }
    inv.coins = (inv.coins || 0) - coinAmt;
    inv[item] = (inv[item] || 0) + qty;
    persistCityInventory();
    updateHUD();
    (refreshShop === 'openBlacksmith' ? openBlacksmith : openMerchant)();
    notify(`✅ اشتريت ${qty} ${itemName(item)}`, '#6ddc6d');
};

window.heal = function() {
    if (player.hp >= player.maxHp) { notify('❤️ صحتك كاملة!', '#6ddc6d'); closeModal(); return; }
    if (foodCount('meat') < 2) { notify('❌ تحتاج 2 لحمة', '#e74c3c'); return; }
    if (typeof GameState !== 'undefined' && GameState.takeFood) {
        GameState.takeFood(player.inventory, 'meat', 2);
    } else {
        player.inventory.meat -= 2;
    }
    player.hp = player.maxHp;
    persistCityInventory();
    persistHp();
    notify('❤️ استعدت صحتك كاملة!', '#e74c3c');
    closeModal();
};

window.healFish = function() {
    if (player.hp >= player.maxHp) { notify('❤️ صحتك كاملة!', '#6ddc6d'); closeModal(); return; }
    if (foodCount('fish') < 2) { notify('❌ تحتاج 2 سمكة', '#e74c3c'); return; }
    if (typeof GameState !== 'undefined' && GameState.takeFood) {
        GameState.takeFood(player.inventory, 'fish', 2);
    } else {
        player.inventory.fish -= 2;
    }
    player.hp = Math.min(player.maxHp, player.hp + Math.floor(player.maxHp / 2));
    persistCityInventory();
    persistHp();
    notify('❤️ تعافيت جزئياً!', '#5dade2');
    closeModal();
};

function hasRested() {
    const st = getCityMapState();
    return !!(st._restedOnce);
}

function markRested() {
    const st = getCityMapState();
    st._restedOnce = true;
    persistCityMapState(st);
}

window.rest = function() {
    if (player.hp >= player.maxHp) { notify('❤️ صحتك كاملة!', '#6ddc6d'); closeModal(); return; }
    if (hasRested()) { notify('💤 استرحت مسبقاً اليوم', '#aaddff'); closeModal(); return; }
    const before = player.hp;
    player.hp = Math.min(player.maxHp, player.hp + 20);
    markRested();
    persistCityInventory();
    persistHp();
    notify(`💤 استرحت! +${Math.round(player.hp - before)}❤️`, '#aaddff');
    closeModal();
};

// ─────────────── WEAPON SHARPEN ───────────────
function hasWeaponUpgraded() {
    const st = getCityMapState();
    return !!(st._weaponUpgraded);
}

function markWeaponUpgraded() {
    const st = getCityMapState();
    st._weaponUpgraded = true;
    persistCityMapState(st);
}

window.weaponSharpen = function() {
    if (hasWeaponUpgraded()) { notify('✅ سبق وشحذت سلاحك', '#aaddff'); closeModal(); return; }
    if ((player.inventory.stone || 0) < 2) { notify('❌ تحتاج 2 🪨 حجر', '#e74c3c'); return; }
    if ((player.inventory.horn || 0) < 1) { notify('❌ تحتاج 1 🦴 قرن', '#e74c3c'); return; }
    player.inventory.stone -= 2;
    player.inventory.horn -= 1;
    markWeaponUpgraded();
    const stats = GameState.getHeroStats();
    stats.absorbedAttack = (stats.absorbedAttack || 0) + 5;
    GameState.save('heroStats', stats);
    persistCityInventory();
    notify('🗡️ شحذت سلاحك! +5 هجوم', '#ffd060');
    closeModal();
};

// ─────────────── PLAYER UPDATE ───────────────
let lastTime = 0;
function updatePlayer(dt) {
    if (document.getElementById('modal').classList.contains('open')) return;
    let dx = 0, dy = 0;
    if (keys['w']||keys['W']||keys['ArrowUp'])    { dy -= 1; player.facing='up'; }
    if (keys['s']||keys['S']||keys['ArrowDown'])  { dy += 1; player.facing='down'; }
    if (keys['a']||keys['A']||keys['ArrowLeft'])  { dx -= 1; player.facing='left'; }
    if (keys['d']||keys['D']||keys['ArrowRight']) { dx += 1; player.facing='right'; }

    const spd = CFG.SPEED;
    if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

    const nx = Math.max(14, Math.min(W - 14, player.x + dx * spd));
    const ny = Math.max(14, Math.min(H - 14, player.y + dy * spd));

    if (!isBlocked(nx, player.y)) player.x = nx;
    if (!isBlocked(player.x, ny)) player.y = ny;

    player.isMoving = dx !== 0 || dy !== 0;
    if (player.isMoving) player.walkTimer += dt;
    else player.walkTimer = 0;
}

// ─────────────── DRAW ───────────────
function drawTerrain() {
    if (terrainCanvas) {
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(terrainCanvas, 0, 0);
    }
}

// Compact city overview: terrain material, services, citizens, and hero.
function drawCityMinimap() {
    if (!cityMapCtx) return;
    const mw = cityMapCanvas.width, mh = cityMapCanvas.height;
    const tw = mw / CFG.COLS, th = mh / CFG.ROWS;
    const colors = {
        [T.BUILDING]: '#5f4632', [T.STONE]: '#8a887f', [T.ROAD]: '#6c6252',
        [T.GRASS]: '#347838', [T.WATER]: '#1769a8', [T.SAND]: '#b99b4b'
    };
    cityMapCtx.clearRect(0, 0, mw, mh);
    for (let r = 0; r < CFG.ROWS; r++) {
        for (let c = 0; c < CFG.COLS; c++) {
            cityMapCtx.fillStyle = colors[getTile(c, r)] || '#555';
            cityMapCtx.fillRect(c * tw, r * th, Math.ceil(tw) + 1, Math.ceil(th) + 1);
        }
    }
    cityMapCtx.fillStyle = '#ffd060';
    for (const npc of NPCS) cityMapCtx.fillRect(npc.x / W * mw - 1.5, npc.y / H * mh - 1.5, 3, 3);
    cityMapCtx.fillStyle = '#93d8ff';
    for (const citizen of walkers) cityMapCtx.fillRect(citizen.x / W * mw - 1, citizen.y / H * mh - 1, 2, 2);
    cityMapCtx.fillStyle = '#fff';
    cityMapCtx.beginPath();
    cityMapCtx.arc(player.x / W * mw, player.y / H * mh, 3, 0, Math.PI * 2);
    cityMapCtx.fill();
}

function drawPortal() {
    const { x, y, radius } = FOREST_PORTAL;
    const pulse = 0.85 + Math.sin(Date.now() * 0.002) * 0.15;

    ctx.save();
    // Road under gate
    ctx.fillStyle = '#b8a878';
    ctx.fillRect(x - 22, y - 20, 44, 50);

    // Left pillar
    ctx.fillStyle = '#7a7060'; ctx.fillRect(x - 40, y - 48, 18, 72);
    ctx.fillStyle = '#9a9080'; ctx.fillRect(x - 38, y - 46, 6, 68);
    // Right pillar
    ctx.fillStyle = '#7a7060'; ctx.fillRect(x + 22, y - 48, 18, 72);
    ctx.fillStyle = '#9a9080'; ctx.fillRect(x + 32, y - 46, 6, 68);
    // Arch
    ctx.fillStyle = '#6a6050';
    ctx.beginPath(); ctx.ellipse(x, y - 48, 41, 22, 0, Math.PI, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#9a9080';
    ctx.beginPath(); ctx.ellipse(x, y - 48, 31, 15, 0, Math.PI, Math.PI*2); ctx.fill();
    // Portal glow
    const grd = ctx.createRadialGradient(x, y - 38, 4, x, y - 38, 30);
    grd.addColorStop(0, `rgba(80,220,120,${0.6*pulse})`);
    grd.addColorStop(1, 'rgba(40,180,80,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.ellipse(x, y-38, 28, 18, 0, 0, Math.PI*2); ctx.fill();
    // Sign
    ctx.fillStyle = '#3a2808'; ctx.fillRect(x-32, y-76, 64, 22);
    ctx.strokeStyle = '#806020'; ctx.lineWidth = 2; ctx.strokeRect(x-32, y-76, 64, 22);
    ctx.fillStyle = '#a0ff80'; ctx.font = 'bold 11px Cairo'; ctx.textAlign = 'center';
    ctx.fillText('🌲 العودة للغابة', x, y - 60);

    // Particles
    for (let i = 0; i < 5; i++) {
        const t2 = (Date.now() * 0.0008 + i * 1.2) % 3;
        const px = x + Math.sin(i*2.5 + Date.now()*0.001)*16;
        const py = y - 38 - t2 * 16;
        const a = Math.max(0, 1 - t2/3) * pulse;
        ctx.fillStyle = `rgba(100,255,130,${a*0.8})`;
        ctx.beginPath(); ctx.arc(px, py, 2.2, 0, Math.PI*2); ctx.fill();
    }

    // Proximity label
    if (Math.hypot(player.x - x, player.y - y) < radius) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.beginPath(); ctx.roundRect(x-65, y-96, 130, 22, 6); ctx.fill();
        ctx.fillStyle = '#a0ff80'; ctx.font = 'bold 11px Cairo';
        ctx.fillText('[E] العودة للغابة 🌲', x, y - 80);
    }
    ctx.restore();
}

function drawBuildings() {
    const ts = CFG.TILE;
    // Draw building rooftops/windows for decoration
    ctx.save();
    // Top buildings row — row 2-4
    const bldgs = [
        { c:1, r:2, w:4, h:3, color:'#604828', label:'⚒️ الحداد', npcId:'blacksmith' },
        { c:5, r:2, w:4, h:3, color:'#284860', label:'🏥 المشفى', npcId:'healer' },
        { c:9, r:2, w:5, h:3, color:'#284828', label:'🛒 التاجر', npcId:'merchant' },
        { c:14, r:2, w:4, h:3, color:'#482848', label:'🏨 النزل', npcId:null },
        { c:18, r:2, w:4, h:3, color:'#483020', label:'📚 المكتبة', npcId:null },
        { c:1, r:14, w:4, h:2, color:'#405030', label:'🌾 المزرعة', npcId:null },
        { c:5, r:14, w:4, h:2, color:'#503040', label:'🏺 الحرفي', npcId:null },
        { c:14, r:14, w:4, h:2, color:'#304050', label:'⚗️ العالم', npcId:null },
        { c:18, r:14, w:4, h:2, color:'#504020', label:'🍺 الحانة', npcId:null },
    ];
    for (const b of bldgs) {
        const bx = b.c * ts, by = b.r * ts, bw = b.w * ts, bh = b.h * ts;
        // Shadow, tiled roof, and a warm shopfront give each district a clearer silhouette.
        ctx.fillStyle = 'rgba(0,0,0,0.22)';
        ctx.fillRect(bx + 5, by + 7, bw, bh);
        ctx.fillStyle = b.color;
        ctx.fillRect(bx, by + 10, bw, bh - 10);
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.beginPath();
        ctx.moveTo(bx - 4, by + 12); ctx.lineTo(bx + bw / 2, by - 5); ctx.lineTo(bx + bw + 4, by + 12);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = 'rgba(20,12,8,0.22)';
        for (let tx = bx + 7; tx < bx + bw; tx += 16) {
            ctx.fillRect(tx, by + 12, 10, 3);
            ctx.fillRect(tx + 5, by + 20, 10, 3);
        }
        // Shop awning
        ctx.fillStyle = 'rgba(15,18,18,0.48)';
        ctx.fillRect(bx + 5, by + bh - 29, bw - 10, 5);
        ctx.fillStyle = 'rgba(255,208,96,0.12)';
        ctx.fillRect(bx + 5, by + bh - 24, bw - 10, 4);
        // Door
        ctx.fillStyle = '#2a1808';
        ctx.fillRect(bx + bw/2 - 7, by + bh - 18, 14, 18);
        ctx.fillStyle = '#d7ab4a'; ctx.fillRect(bx + bw/2 + 3, by + bh - 9, 2, 2);
        // Windows
        ctx.fillStyle = 'rgba(255,220,100,0.72)';
        ctx.fillRect(bx + 12, by + bh - 20, 12, 8);
        ctx.fillRect(bx + bw - 24, by + bh - 20, 12, 8);
        ctx.strokeStyle = 'rgba(45,30,16,0.7)'; ctx.lineWidth = 1;
        ctx.strokeRect(bx + 12, by + bh - 20, 12, 8);
        ctx.strokeRect(bx + bw - 24, by + bh - 20, 12, 8);
        // Large signboard: room names remain readable at fullscreen size.
        const signW = Math.min(bw - 18, Math.max(76, b.label.length * 10 + 24));
        const signY = by + bh / 2 - 10;
        ctx.fillStyle = 'rgba(18,14,10,0.82)';
        ctx.strokeStyle = 'rgba(255,208,96,0.58)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.roundRect(bx + bw / 2 - signW / 2, signY, signW, 23, 5); ctx.fill(); ctx.stroke();
        ctx.font = 'bold 13px Cairo';
        ctx.fillStyle = '#ffe49a';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(b.label, bx + bw/2, signY + 12);
        ctx.textBaseline = 'alphabetic';
    }
    ctx.restore();
}

function drawNPCs() {
    for (const npc of NPCS) {
        const near = Math.hypot(player.x - npc.x, player.y - npc.y) < 55;
        const spoken = isSpoken(npc.id);
        ctx.save();
        // Ground marker (building accent)
        ctx.fillStyle = npc.color + '40';
        ctx.beginPath(); ctx.ellipse(npc.x, npc.y + 4, 20, 10, 0, 0, Math.PI*2); ctx.fill();
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.beginPath(); ctx.ellipse(npc.x, npc.y + 12, 14, 6, 0, 0, Math.PI*2); ctx.fill();
        // Large, high-contrast character marker (easy to identify at fullscreen).
        const pulse = near ? 1 + Math.sin(Date.now() * 0.005) * 0.08 : 1;
        ctx.beginPath(); ctx.arc(npc.x, npc.y, 21 * pulse, 0, Math.PI*2);
        ctx.fillStyle = npc.color; ctx.fill();
        ctx.strokeStyle = near ? '#ffd060' : (spoken ? 'rgba(255,208,96,0.42)' : 'rgba(255,255,255,0.52)');
        ctx.lineWidth = near ? 3 : 2; ctx.stroke();
        // Emoji
        ctx.font = `${22*pulse}px serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(npc.emoji, npc.x, npc.y);
        ctx.textBaseline = 'alphabetic';
        // Label
        ctx.font = `bold ${near?14:12}px Cairo`;
        ctx.fillStyle = near ? '#ffe49a' : '#f0eee7';
        ctx.shadowColor = 'rgba(0,0,0,.9)'; ctx.shadowBlur = 4;
        ctx.fillText(npc.label, npc.x, npc.y - 29 * pulse);
        ctx.shadowBlur = 0;
        // Spoken checkmark
        if (spoken && !near) {
            ctx.font = '10px Cairo';
            ctx.fillStyle = 'rgba(255,208,96,0.5)';
            ctx.textAlign = 'center';
            ctx.fillText('✓', npc.x + 20, npc.y - 28);
        }
        // Interaction hint
        if (near) {
            ctx.fillStyle = 'rgba(0,0,0,0.65)';
            ctx.beginPath(); ctx.roundRect(npc.x-40, npc.y-48, 80, 18, 5); ctx.fill();
            ctx.fillStyle = '#ffd060'; ctx.font = 'bold 10px Cairo';
            ctx.fillText('[E] للتحدث', npc.x, npc.y - 35);
        }
        ctx.restore();
    }
}

function drawPlayer() {
    const { x, y, walkTimer, isMoving, facing } = player;
    const t = walkTimer * 0.008;
    const legSwing = isMoving ? Math.sin(t) * 5 : 0;
    const crafted = GameState.getCraftedItems ? GameState.getCraftedItems() : {};

    ctx.save();
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.beginPath(); ctx.ellipse(x, y + 14, 12, 5, 0, 0, Math.PI*2); ctx.fill();

    // Legs
    ctx.fillStyle = '#2a2040';
    ctx.fillRect(x - 6, y + 2, 5, 12 + (isMoving ? Math.sin(t)*3 : 0));
    ctx.fillRect(x + 1, y + 2, 5, 12 - (isMoving ? Math.sin(t)*3 : 0));

    // Body
    ctx.fillStyle = '#e8c88a';
    ctx.fillRect(x - 9, y - 12, 18, 16);
    // Equipment material carries over from the forest crafting system.
    ctx.fillStyle = crafted.leatherArmor ? '#7b542d' : '#3060a0';
    ctx.fillRect(x - 8, y - 8, 16, 10);
    if (crafted.leatherArmor) {
        ctx.strokeStyle = '#d6a55a'; ctx.lineWidth = 1;
        ctx.strokeRect(x - 8, y - 8, 16, 10);
    }
    // Belt
    ctx.fillStyle = '#60401a';
    ctx.fillRect(x - 9, y + 3, 18, 3);

    // Head
    ctx.fillStyle = '#e8c28a';
    ctx.beginPath(); ctx.ellipse(x, y - 18, 11, 10, 0, 0, Math.PI*2); ctx.fill();
    // Hair
    ctx.fillStyle = '#603010';
    ctx.beginPath(); ctx.ellipse(x, y - 24, 10, 6, 0, Math.PI, Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle = '#201008';
    ctx.beginPath(); ctx.arc(x-4, y-17, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+4, y-17, 2, 0, Math.PI*2); ctx.fill();

    // Crafted weapon silhouette: it makes the city hero match the forest hero.
    if (crafted.hornSword || crafted.nightBlade) {
        ctx.strokeStyle = crafted.nightBlade ? '#a883ff' : '#d6d6d6';
        ctx.lineWidth = 3; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(x + 10, y - 4); ctx.lineTo(x + 17, y - 16); ctx.stroke();
        ctx.strokeStyle = '#8a5a2a'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(x + 8, y - 4); ctx.lineTo(x + 13, y + 1); ctx.stroke();
    } else if (crafted.hornSpear) {
        ctx.strokeStyle = '#b98a4b'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(x + 9, y + 8); ctx.lineTo(x + 19, y - 18); ctx.stroke();
        ctx.fillStyle = '#ddd'; ctx.beginPath(); ctx.moveTo(x+19,y-20); ctx.lineTo(x+23,y-13); ctx.lineTo(x+16,y-14); ctx.closePath(); ctx.fill();
    }

    ctx.restore();
}

function drawWell() {
    // Central decorative well
    const wx = W/2, wy = CFG.TILE * 8.5;
    ctx.save();
    ctx.fillStyle = '#7a7060';
    ctx.beginPath(); ctx.ellipse(wx, wy+5, 22, 10, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#5a5040';
    ctx.beginPath(); ctx.ellipse(wx, wy, 20, 9, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a80b0';
    ctx.beginPath(); ctx.ellipse(wx, wy-2, 14, 6, 0, 0, Math.PI*2); ctx.fill();
    // Posts
    ctx.fillStyle = '#5a3010';
    ctx.fillRect(wx-18, wy-20, 5, 22);
    ctx.fillRect(wx+13, wy-20, 5, 22);
    // Crossbar
    ctx.fillStyle = '#7a4018';
    ctx.fillRect(wx-20, wy-22, 40, 5);
    ctx.font = '10px Cairo'; ctx.fillStyle = '#ccc'; ctx.textAlign = 'center';
    ctx.fillText('🪣 البئر', wx, wy-28);
    ctx.restore();
}

// ─────────────── DISTRICT LABELS ───────────────
function drawDistrictLabels() {
    const ts = CFG.TILE;
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // North commerce district
    ctx.font = 'bold 14px Cairo';
    ctx.fillStyle = 'rgba(255,208,96,0.85)';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 6;
    ctx.fillText('ـــ حي التجارة ـــ', W / 2, 1.6 * ts);
    ctx.shadowBlur = 0;

    // Central plaza label — above well
    ctx.font = 'bold 16px Cairo';
    ctx.fillStyle = 'rgba(255,208,96,0.9)';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 8;
    ctx.fillText('✦ ساحة المدينة ✦', W / 2, 7.3 * ts);
    ctx.shadowBlur = 0;

    // South district
    ctx.font = 'bold 14px Cairo';
    ctx.fillStyle = 'rgba(255,208,96,0.8)';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 6;
    ctx.fillText('ـــ الحي الجنوبي ـــ', W / 2, 13.5 * ts);
    ctx.shadowBlur = 0;

    // South gate directional hint
    ctx.font = '11px Cairo';
    ctx.fillStyle = isSouthGateUnlocked() ? 'rgba(160,255,128,0.75)' : 'rgba(200,160,80,0.65)';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.fillText(isSouthGateUnlocked() ? '↓ الغابة الجنوبية — مفتوح' : '↓ بوابة الغابة الجنوبية (مقفلة)', W / 2, 16 * ts);
    ctx.shadowBlur = 0;

    ctx.restore();
}

// ─────────────── SOUTH GATE ───────────────
function drawSouthGate() {
    const ts = CFG.TILE;
    const gx = SOUTH_GATE.x;
    const gy = SOUTH_GATE.y;
    const unlocked = isSouthGateUnlocked();
    const near = isNearPortal(SOUTH_GATE);
    const pulse = 0.85 + Math.sin(Date.now() * (unlocked ? 0.003 : 0.004)) * 0.15;

    ctx.save();
    // Left pillar
    ctx.fillStyle = '#5a4a38';
    ctx.fillRect(gx - 3.5 * ts - 5, gy - 48, 16, 64);
    ctx.fillStyle = '#6a5a48';
    ctx.fillRect(gx - 3.5 * ts - 3, gy - 46, 6, 60);
    // Right pillar
    ctx.fillStyle = '#5a4a38';
    ctx.fillRect(gx + 3.5 * ts - 11, gy - 48, 16, 64);
    ctx.fillStyle = '#6a5a48';
    ctx.fillRect(gx + 3.5 * ts - 9, gy - 46, 6, 60);

    if (unlocked) {
        // Arch glow — green
        const grd = ctx.createRadialGradient(gx, gy - 10, 4, gx, gy - 10, 50);
        grd.addColorStop(0, `rgba(80,220,120,${0.4 * pulse})`);
        grd.addColorStop(1, 'rgba(40,180,80,0)');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.ellipse(gx, gy - 10, 60, 30, 0, 0, Math.PI * 2);
        ctx.fill();
        // Sign — open
        const signY = gy - 50;
        ctx.fillStyle = '#3a2808';
        ctx.fillRect(gx - 72, signY - 10, 144, 22);
        ctx.strokeStyle = '#806020';
        ctx.lineWidth = 2;
        ctx.strokeRect(gx - 72, signY - 10, 144, 22);
        ctx.fillStyle = '#a0ff80';
        ctx.font = 'bold 11px Cairo';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🚪 الغابة الجنوبية — مفتوح', gx, signY + 2);
    } else {
        // Cross beam
        ctx.fillStyle = '#4a3a28';
        ctx.fillRect(gx - 3.5 * ts - 5, gy - 50, 7 * ts + 10, 10);
        ctx.strokeStyle = '#6a5a3a';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(gx - 3.5 * ts - 5, gy - 50, 7 * ts + 10, 10);
        // Chains
        ctx.strokeStyle = '#8a7a6a';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(gx - 3.2 * ts, gy - 40);
        ctx.lineTo(gx - ts * 1.2, gy + 8);
        ctx.moveTo(gx + 3.2 * ts, gy - 40);
        ctx.lineTo(gx + ts * 1.2, gy + 8);
        ctx.stroke();
        // Lock
        ctx.font = '24px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(200,0,0,0.5)';
        ctx.shadowBlur = 8 * pulse;
        const r = Math.floor(180 + 75 * (1 - pulse));
        ctx.fillStyle = `rgb(${r},60,40)`;
        ctx.fillText('🔒', gx, gy - 6);
        ctx.shadowBlur = 0;
        // Sign
        const signY = gy + 28;
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.beginPath();
        ctx.roundRect(gx - 72, signY - 10, 144, 22, 6);
        ctx.fill();
        ctx.fillStyle = '#ffd060';
        ctx.font = 'bold 11px Cairo';
        ctx.textBaseline = 'middle';
        ctx.fillText('🚧 بوابة الغابة الجنوبية — مقفلة', gx, signY + 2);
    }
    // Proximity hint
    if (near) {
        if (unlocked) {
            ctx.fillStyle = 'rgba(0,0,0,0.65)';
            ctx.beginPath();
            ctx.roundRect(gx - 72, gy + (unlocked ? 30 : 50), 144, 20, 6);
            ctx.fill();
            ctx.fillStyle = '#a0ff80';
            ctx.font = 'bold 10px Cairo';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('[E] اذهب إلى الغابة الجنوبية 🗡️', gx, gy + (unlocked ? 40 : 60));
        } else {
            ctx.fillStyle = 'rgba(200,60,40,0.1)';
            ctx.beginPath();
            ctx.roundRect(gx - 80, gy + 50, 160, 20, 6);
            ctx.fill();
        }
    }
    ctx.restore();
}

// ─────────────── CITY CITIZENS ───────────────
// Citizens visit real locations rather than repeating a fixed line.  Shared
// stops make them naturally meet, pause, and exchange a few words.
const CITY_STOPS = [
    { name: 'التاجر', x: CFG.TILE * 11.5, y: CFG.TILE * 5.5 },
    { name: 'الحداد', x: CFG.TILE * 3, y: CFG.TILE * 5.5 },
    { name: 'المعالج', x: CFG.TILE * 7, y: CFG.TILE * 5.5 },
    { name: 'الساحة', x: W / 2 - 56, y: CFG.TILE * 10.5 },
    { name: 'البئر', x: W / 2 + 54, y: CFG.TILE * 9.5 },
    { name: 'الحي الجنوبي', x: W / 2, y: CFG.TILE * 13.5 },
];
const CITY_CHAT_LINES = [
    ['أهلاً يا صديقي!', 'أهلاً بك!'],
    ['كيف الحال؟', 'بخير، الحمد لله.'],
    ['هل زرت التاجر؟', 'نعم، اشتريت سهاماً.'],
    ['الحداد مشغول اليوم.', 'سأمر عليه لاحقاً.'],
    ['المدينة هادئة اليوم.', 'نعم، جو جميل.'],
    ['إلى أين تذهب؟', 'إلى الساحة قليلاً.'],
];

const walkers = [
    { name:'سالم', emoji:'🧑', color:'#6a7a9a', x:CITY_STOPS[0].x, y:CITY_STOPS[0].y, target: CITY_STOPS[3] },
    { name:'ليلى', emoji:'👩', color:'#9a7a6a', x:CITY_STOPS[1].x, y:CITY_STOPS[1].y, target: CITY_STOPS[3] },
    { name:'عمر', emoji:'👤', color:'#7a9a6a', x:CITY_STOPS[5].x, y:CITY_STOPS[5].y, target: CITY_STOPS[4] },
    { name:'مريم', emoji:'🧕', color:'#96704f', x:CITY_STOPS[2].x, y:CITY_STOPS[2].y, target: CITY_STOPS[4] },
].map(w => Object.assign(w, {
    state: 'walking', waitUntil: 0, talkUntil: 0, partner: null,
    bubble: '', bubbleUntil: 0, speed: 0.045 + Math.random() * 0.012
}));

function pickCitizenStop(citizen) {
    let next = CITY_STOPS[Math.floor(Math.random() * CITY_STOPS.length)];
    // A visit to the plaza is more likely, giving citizens a natural meeting point.
    if (Math.random() < 0.38) next = CITY_STOPS[Math.random() < 0.5 ? 3 : 4];
    if (next === citizen.target) next = CITY_STOPS[(CITY_STOPS.indexOf(next) + 1) % CITY_STOPS.length];
    return next;
}

function startCitizenConversation(a, b, now) {
    const lines = CITY_CHAT_LINES[Math.floor(Math.random() * CITY_CHAT_LINES.length)];
    const duration = 2600 + Math.random() * 1500;
    a.state = b.state = 'talking';
    a.partner = b; b.partner = a;
    a.talkUntil = b.talkUntil = now + duration;
    a.bubble = lines[0]; b.bubble = lines[1];
    a.bubbleUntil = b.bubbleUntil = now + duration;
}

function updateWalkers(dt) {
    const now = performance.now();
    for (const w of walkers) {
        if (w.state === 'talking') {
            if (now >= w.talkUntil) {
                w.state = 'waiting'; w.partner = null;
                w.waitUntil = now + 900 + Math.random() * 1300;
            }
            continue;
        }
        if (w.state === 'waiting') {
            if (now < w.waitUntil) continue;
            w.target = pickCitizenStop(w);
            w.state = 'walking';
        }
        const dx = w.target.x - w.x;
        const dy = w.target.y - w.y;
        const distance = Math.hypot(dx, dy);
        if (distance <= 2) {
            w.x = w.target.x; w.y = w.target.y;
            w.state = 'waiting';
            w.waitUntil = now + 900 + Math.random() * 2400;
            w.bubble = `⇢ ${w.target.name}`;
            w.bubbleUntil = now + 1050;
            continue;
        }
        const step = Math.min(distance, w.speed * dt);
        w.x += dx / distance * step;
        w.y += dy / distance * step;
    }

    // Only idle citizens begin a conversation, so no one talks while walking.
    for (let i = 0; i < walkers.length; i++) {
        for (let j = i + 1; j < walkers.length; j++) {
            const a = walkers[i], b = walkers[j];
            if (a.state !== 'waiting' || b.state !== 'waiting') continue;
            if (Math.hypot(a.x - b.x, a.y - b.y) < 58 && Math.random() < dt / 850) {
                startCitizenConversation(a, b, now);
            }
        }
    }
}

function drawWalkers() {
    for (const w of walkers) {
        ctx.save();
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.ellipse(w.x, w.y + 10, 10, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        // Body circle
        ctx.beginPath();
        ctx.arc(w.x, w.y, 16, 0, Math.PI * 2);
        ctx.fillStyle = w.color;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.62)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Emoji
        ctx.font = '19px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(w.emoji, w.x, w.y);
        // Name and a short, readable speech bubble for nearby conversations.
        ctx.font = 'bold 10px Cairo';
        ctx.fillStyle = '#f5f1df';
        ctx.shadowColor = 'rgba(0,0,0,.9)'; ctx.shadowBlur = 3;
        ctx.fillText(w.name, w.x, w.y + 27);
        ctx.shadowBlur = 0;
        if (w.bubble && performance.now() < w.bubbleUntil) {
            ctx.font = 'bold 9px Cairo';
            const bw = Math.max(52, ctx.measureText(w.bubble).width + 16);
            const by = w.y - 37;
            ctx.fillStyle = 'rgba(18,23,28,0.9)';
            ctx.strokeStyle = 'rgba(255,208,96,0.55)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.roundRect(w.x - bw / 2, by - 11, bw, 20, 6); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#fff0bd';
            ctx.fillText(w.bubble, w.x, by);
        }
        ctx.restore();
    }
}

// ─────────────── GAME LOOP ───────────────
let cityPaused = false;
let _cityRafId = 0;

function gameLoop(ts) {
    _cityRafId = requestAnimationFrame(gameLoop);
    if (cityPaused) return;

    const dt = Math.min(ts - lastTime, 50);
    lastTime = ts;

    updatePlayer(dt);
    updateWalkers(dt);

    ctx.clearRect(0, 0, W, H);
    drawTerrain();
    drawBuildings();
    drawWell();
    drawDistrictLabels();
    drawPortal();
    drawSouthGate();
    drawNPCs();
    drawWalkers();
    drawPlayer();
    drawCityMinimap();
}

document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
        cityPaused = true;
        try {
            persistCityInventory();
            GameState.autoSave(true);
        } catch (_) { /* ignore */ }
    } else {
        cityPaused = false;
        lastTime = performance.now();
    }
});

// ─────────────── INIT ───────────────
if (typeof guardSceneAccess === 'function' && !guardSceneAccess('city')) {
    /* lock modal + redirect — do not boot city */
} else {
updateHUD();
const _cityLoadLabel = (typeof createLoadingScreen === 'function')
    ? createLoadingScreen('جاري تحميل الخريطة…')
    : (() => {
        const el = document.createElement('div');
        el.style.cssText = 'position:fixed;inset:0;z-index:200;display:flex;align-items:center;' +
            'justify-content:center;background:#1a1a2e;color:#ffd060;font-family:Cairo,sans-serif;' +
            'font-size:1.4rem;font-weight:700;letter-spacing:2px;';
        el.textContent = 'جاري تحميل الخريطة…';
        return el;
    })();
document.body.appendChild(_cityLoadLabel);
loadTerrainTextures(tex => {
    prerenderTerrain(tex);
    _cityLoadLabel.remove();
    _cityRafId = requestAnimationFrame(ts => { lastTime = ts; gameLoop(ts); });
});
}
</script>
