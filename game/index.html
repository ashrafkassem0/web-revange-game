<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الانتقام - اللعبة</title>
    <link rel="stylesheet" href="css/shared.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }

        .main-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .main-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.4);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%);
            z-index: 2;
        }

        .main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .logo-title {
            font-size: 6rem;
            font-weight: 900;
            color: #fff;
            text-shadow:
                0 0 20px rgba(231, 76, 60, 0.9),
                0 0 60px rgba(231, 76, 60, 0.6),
                0 0 120px rgba(231, 76, 60, 0.3);
            margin-bottom: 10px;
            animation: logoGlow 4s ease-in-out infinite;
            letter-spacing: 8px;
        }

        @keyframes logoGlow {
            0%, 100% {
                text-shadow:
                    0 0 20px rgba(231, 76, 60, 0.9),
                    0 0 60px rgba(231, 76, 60, 0.6),
                    0 0 120px rgba(231, 76, 60, 0.3);
            }
            50% {
                text-shadow:
                    0 0 30px rgba(231, 76, 60, 1),
                    0 0 90px rgba(231, 76, 60, 0.8),
                    0 0 160px rgba(231, 76, 60, 0.4);
            }
        }

        .logo-subtitle {
            font-size: 1.5rem;
            color: #999;
            margin-bottom: 60px;
            letter-spacing: 2px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
        }

        .menu-btn {
            width: 280px;
            padding: 16px 40px;
            font-size: 1.3rem;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.08), transparent);
            animation: menuShine 4s ease-in-out infinite;
        }

        @keyframes menuShine {
            0%, 100% { transform: translateX(-100%) rotate(45deg); }
            50% { transform: translateX(100%) rotate(45deg); }
        }

        .menu-btn-play {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
            box-shadow: 0 0 25px rgba(231, 76, 60, 0.5), 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .menu-btn-play:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(231, 76, 60, 0.8), 0 12px 30px rgba(0, 0, 0, 0.5);
        }

        .menu-btn-continue {
            background: linear-gradient(135deg, #27ae60, #1e8449);
            color: #fff;
            box-shadow: 0 0 25px rgba(39, 174, 96, 0.5), 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .menu-btn-continue:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(39, 174, 96, 0.8), 0 12px 30px rgba(0, 0, 0, 0.5);
        }

        .menu-btn-disabled {
            background: linear-gradient(135deg, #555, #333);
            color: #888;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            cursor: not-allowed;
        }

        .menu-btn-disabled:hover {
            transform: none;
        }

        .version-text {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #444;
            font-size: 0.8rem;
            z-index: 10;
        }

        .menu-audio {
            position: absolute;
            bottom: 52px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 12;
            direction: rtl;
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, rgba(30,42,26,0.92), rgba(42,48,32,0.92));
            border: 1px solid #6a8040;
            border-radius: 14px;
            padding: 12px 18px;
            min-width: 260px;
            color: #e8e0c0;
            box-shadow: 0 8px 28px rgba(0,0,0,0.4);
        }
        .menu-audio h3 {
            margin: 0 0 10px;
            font-size: 0.95rem;
            color: #ffd060;
            font-weight: 900;
            text-align: center;
        }
        .menu-audio-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }
        .menu-audio-row label { color: #ccc; min-width: 70px; }
        .menu-audio-row input[type="range"] { flex: 1; accent-color: #ffd060; cursor: pointer; }
        .menu-audio-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: #ffd060; cursor: pointer; }
        .menu-audio-hint { text-align: center; font-size: 0.7rem; color: #777; margin-top: 4px; }

        .floating-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .f-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(231, 76, 60, 0.3);
            border-radius: 50%;
            animation: floatP 8s ease-in-out infinite;
        }

        @keyframes floatP {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            25% { transform: translateY(-20px) translateX(10px); opacity: 0.6; }
            50% { transform: translateY(-40px) translateX(-5px); opacity: 0.8; }
            75% { transform: translateY(-20px) translateX(15px); opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="fade-overlay"></div>

    <div class="game-container">
        <div class="main-bg">
            <img src="start/images/bg_title_screen.png" alt="">
        </div>
        <div class="overlay"></div>
        <div class="floating-particles" id="floatingParticles"></div>

        <div class="main-content">
            <h1 class="logo-title">الانتقام</h1>
            <p class="logo-subtitle">قصة أشرف</p>

            <div class="menu-buttons">
                <button class="menu-btn menu-btn-play" onclick="newGame()">لعبة جديدة</button>
                <button class="menu-btn" id="continueBtn" onclick="continueGame()">متابعة اللعب</button>
            </div>
        </div>

        <div class="menu-audio" id="menuAudio" dir="rtl">
            <h3>الصوت</h3>
            <div class="menu-audio-row">
                <label for="menuMaster">الرئيسي</label>
                <input type="range" id="menuMaster" min="0" max="100" value="100"
                       oninput="menuAudioSlider('master', this.value)">
            </div>
            <div class="menu-audio-row">
                <label for="menuSfx">المؤثرات</label>
                <input type="range" id="menuSfx" min="0" max="100" value="100"
                       oninput="menuAudioSlider('sfx', this.value)">
            </div>
            <div class="menu-audio-row">
                <label for="menuAmbient">الأجواء</label>
                <input type="range" id="menuAmbient" min="0" max="100" value="100"
                       oninput="menuAudioSlider('ambient', this.value)">
            </div>
            <div class="menu-audio-row">
                <label for="menuMute">كتم الصوت</label>
                <input type="checkbox" id="menuMute" onchange="menuAudioMute(this.checked)">
            </div>
            <div class="menu-audio-hint">M لكتم الصوت</div>
        </div>

        <div class="version-text">الإصدار 1.0</div>
    </div>

    <script src="js/shared.js"></script>
    <script src="js/sounds.js"></script>
    <script>
        function slotSummaryText() {
            const slots = (typeof SaveManager !== 'undefined') ? SaveManager.listSlots() : [];
            const auto = slots.find(s => s.slot === 'auto' && !s.empty) ||
                slots.find(s => !s.empty);
            if (!auto) return '';
            const map = (typeof mapLabelAr === 'function') ? mapLabelAr(auto.currentMap) : (auto.currentMap || '');
            const time = (typeof formatPlayTime === 'function') ? formatPlayTime(auto.playTime) : '';
            return `المستوى ${auto.level || 1} · ${map}${time ? ' · ' + time : ''}`;
        }

        function checkContinue() {
            const progress = GameState.getProgress();
            const btn = document.getElementById('continueBtn');
            const hasSave = progress.completedIntro ||
                (typeof SaveManager !== 'undefined' && SaveManager.hasAnySave());
            if (hasSave && progress.completedIntro) {
                btn.className = 'menu-btn menu-btn-continue';
                const summary = slotSummaryText();
                btn.title = summary || 'متابعة اللعب';
                if (summary) btn.textContent = 'متابعة اللعب — ' + summary;
                else btn.textContent = 'متابعة اللعب';
            } else {
                btn.className = 'menu-btn menu-btn-disabled';
                btn.title = 'ابدأ لعبة جديدة أولاً';
                btn.textContent = 'متابعة اللعب';
            }

            // If every slot was corrupt, offer wipe
            if (typeof GameState.handleTotalCorruption === 'function') {
                GameState.handleTotalCorruption();
            }
        }

        function isFirstLaunch() {
            if (typeof SaveManager !== 'undefined' && SaveManager.hasAnySave()) return false;
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    if (localStorage.key(i)?.startsWith('revenge_')) return false;
                }
            } catch (_) {}
            return true;
        }

        function redirectFirstLaunch() {
            if (isFirstLaunch()) {
                window.location.replace('start/index.html');
            }
        }

        function newGame() {
            SFX.click();
            GameState.reset();
            if (typeof navigateToScene === 'function') {
                navigateToScene('start', { skipPrereq: true, skipSave: true });
            } else {
                navigateTo('start/index.html');
            }
        }

        function continueGame() {
            const progress = GameState.getProgress();
            if (!progress.completedIntro) return;

            SFX.click();
            // Prefer auto slot; mark load for save-scum detection
            if (typeof GameState.loadFromSlot === 'function') {
                GameState.loadFromSlot('auto');
            }
            GameState.save('skipForestIntro', true);

            const stage = (typeof GameState.getCurrentStage === 'function')
                ? GameState.getCurrentStage()
                : 'forest';

            const sceneId = (stage === 'intro') ? 'start'
                : (stage === 'city') ? 'city'
                : 'forest';

            if (typeof navigateToScene === 'function') {
                navigateToScene(sceneId, { skipPrereq: true, skipSave: true });
            } else {
                const url = (typeof SaveManager !== 'undefined' && SaveManager.mapUrlFor)
                    ? SaveManager.mapUrlFor(stage)
                    : (stage === 'intro' ? 'start/index.html' : 'forest/index.html');
                navigateTo(url);
            }
        }

        function createParticles() {
            const container = document.getElementById('floatingParticles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'f-particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = (30 + Math.random() * 60) + '%';
                p.style.animationDelay = Math.random() * 8 + 's';
                p.style.animationDuration = (5 + Math.random() * 5) + 's';
                container.appendChild(p);
            }
        }

        function syncMenuAudioUI() {
            if (typeof SFX === 'undefined') return;
            const master = document.getElementById('menuMaster');
            const sfx = document.getElementById('menuSfx');
            const ambient = document.getElementById('menuAmbient');
            const mute = document.getElementById('menuMute');
            if (master && SFX.getMasterVolume) master.value = Math.round(SFX.getMasterVolume() * 100);
            if (sfx && SFX.getSfxVolume) sfx.value = Math.round(SFX.getSfxVolume() * 100);
            if (ambient && SFX.getAmbientVolume) ambient.value = Math.round(SFX.getAmbientVolume() * 100);
            if (mute && SFX.isMuted) mute.checked = SFX.isMuted();
        }

        function menuAudioSlider(kind, value) {
            if (typeof SFX === 'undefined') return;
            const v = Math.max(0, Math.min(100, Number(value) || 0)) / 100;
            if (kind === 'master' && SFX.setMasterVolume) SFX.setMasterVolume(v);
            else if (kind === 'sfx' && SFX.setSfxVolume) SFX.setSfxVolume(v);
            else if (kind === 'ambient' && SFX.setAmbientVolume) SFX.setAmbientVolume(v);
        }

        function menuAudioMute(checked) {
            if (typeof SFX !== 'undefined' && SFX.mute) SFX.mute(!!checked);
        }

        document.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            const tag = e.target && e.target.tagName;
            if (tag === 'INPUT' || tag === 'TEXTAREA') return;
            if (e.code === 'KeyM' && typeof SFX !== 'undefined' && SFX.toggleMute) {
                SFX.toggleMute();
                syncMenuAudioUI();
            }
        });

        redirectFirstLaunch();
        checkContinue();
        createParticles();
        if (typeof SFX !== 'undefined' && SFX.loadSettings) SFX.loadSettings();
        syncMenuAudioUI();
    </script>
</body>
</html>
