<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="مدينة المغامرات — استكشف أسواق المدينة وحاناتها وخدماتها في رحلة مغامراتك">
    <meta name="theme-color" content="#1a1610">
    <title>مدينة المغامرات | Revenge Game</title>

    <!-- الخطوط العربية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- نمط المدينة الحضرية -->
    <link rel="stylesheet" href="css/city.css">
</head>
<body>

<!-- =========================================================
     غلاف اللعبة الكامل
     ========================================================= -->
<div id="game-wrapper">

    <!-- ـ شاشة التحميل ـ -->
    <div id="loading-screen">
        <div id="loading-title">🏙️ مدينة المغامرات</div>
        <div id="loading-sub">جارٍ تحميل المدينة...</div>
        <div id="loading-bar-wrap">
            <div id="loading-bar"></div>
        </div>
    </div>

    <!-- ـ Canvas الرسم الأساسي ـ -->
    <canvas id="city-canvas" role="img" aria-label="خريطة مدينة المغامرات"></canvas>

    <!-- ـ شريط الـ HUD العلوي ـ -->
    <div id="city-hud" role="status" aria-live="polite"></div>

    <!-- ـ منطقة الإشعارات ـ -->
    <div id="notify-area" aria-live="assertive" aria-atomic="true"></div>

    <!-- ـ شريط الأدوات السريعة ـ -->
    <div id="hotbar" role="toolbar" aria-label="حزام الأدوات السريعة"></div>

    <!-- ـ نافذة الحوار / المودال ـ -->
    <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div id="modal-box">
            <div id="modal-header">
                <span id="modal-title">حوار</span>
                <button id="modal-close" aria-label="إغلاق" onclick="CityDialogue.closeModal()">✕</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- ـ أزرار اللمس للهاتف المتنقل ـ -->
    <div id="touch-controls" style="
        position:absolute; bottom:80px; left:14px;
        display:grid; grid-template-columns:repeat(3,44px);
        grid-template-rows:repeat(3,44px); gap:4px;
        z-index:50;
        touch-action:none;
    ">
        <!-- صف الأعلى -->
        <div></div>
        <button id="btn-up" style="
            grid-column:2; grid-row:1;
            background:rgba(255,208,96,0.18);
            border:1.5px solid rgba(255,208,96,0.4);
            border-radius:8px; font-size:18px;
            color:#ffd060; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
        " aria-label="للأعلى">▲</button>
        <div></div>

        <!-- صف الأوسط -->
        <button id="btn-left" style="
            background:rgba(255,208,96,0.18);
            border:1.5px solid rgba(255,208,96,0.4);
            border-radius:8px; font-size:18px;
            color:#ffd060; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
        " aria-label="لليسار">◄</button>
        <button id="btn-action" style="
            background:rgba(255,208,96,0.3);
            border:1.5px solid rgba(255,208,96,0.6);
            border-radius:8px; font-size:13px;
            color:#ffd060; cursor:pointer; font-weight:bold;
            display:flex; align-items:center; justify-content:center;
            font-family:'Cairo',sans-serif;
        " aria-label="تفاعل">E</button>
        <button id="btn-right" style="
            background:rgba(255,208,96,0.18);
            border:1.5px solid rgba(255,208,96,0.4);
            border-radius:8px; font-size:18px;
            color:#ffd060; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
        " aria-label="لليمين">►</button>

        <!-- صف الأسفل -->
        <div></div>
        <button id="btn-down" style="
            grid-column:2;
            background:rgba(255,208,96,0.18);
            border:1.5px solid rgba(255,208,96,0.4);
            border-radius:8px; font-size:18px;
            color:#ffd060; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
        " aria-label="للأسفل">▼</button>
        <div></div>
    </div>

    <!-- ـ صوت الخلفية المحيطية ـ -->
    <audio id="city-ambient" preload="auto" loop>
        <source src="../../assets/audio/city-ambient.ogg" type="audio/ogg">
        <source src="../../assets/audio/city-ambient.mp3" type="audio/mpeg">
    </audio>

</div><!-- /#game-wrapper -->

<!-- =========================================================
     تحميل السكريبتات بالترتيب الصحيح
     ========================================================= -->

<!-- 1. حالة اللعبة المشتركة -->
<script src="../js/shared.js" defer></script>

<!-- 2. المنظومات الأساسية الجوهرية (Core Framework) -->
<script src="../js/core/base-terrain.js" defer></script>
<script src="../js/core/base-npcs.js"    defer></script>
<script src="../js/core/base-weather.js" defer></script>

<!-- 3. إعدادات وبيانات المدينة -->
<script src="js/city-config.js" defer></script>
<script src="js/city-data.js"   defer></script>
<script src="js/city-state.js"  defer></script>

<!-- 4. بناء العالم والرسم -->
<script src="js/city-map.js"      defer></script>
<script src="js/city-buildings.js" defer></script>
<script src="js/city-renderer.js" defer></script>
<script src="js/city-minimap.js"  defer></script>

<!-- 5. اللاعب والشخصيات -->
<script src="js/city-player.js"   defer></script>
<script src="js/city-npcs.js"     defer></script>
<script src="js/city-dialogue.js" defer></script>

<!-- 6. الميكانيكيات والتقدم -->
<script src="js/city-trade.js"    defer></script>
<script src="js/city-services.js" defer></script>
<script src="js/city-quests.js"   defer></script>
<script src="js/city-portals.js"  defer></script>

<!-- 7. واجهة المستخدم والحلقة الرئيسية -->
<script src="js/city-hud.js"  defer></script>
<script src="js/city-main.js" defer></script>

</body>
</html>
